name: E2E Tests (Scheduled)

#on:
  #schedule:
    # Run every hour
    #- cron: '0 * * * *'
  #workflow_dispatch:
    # Allow manual trigger

jobs:
  e2e-playwright:
    name: E2E - Playwright + Gemini
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Install Playwright browsers
        run: mvn exec:java -e -D exec.mainClass=com.microsoft.playwright.CLI -D exec.args="install --with-deps chromium" -B || true

      - name: Build project
        run: mvn clean compile test-compile -B

      - name: Create artifacts directory
        run: mkdir -p target/e2e-artifacts/videos

      - name: Run E2E tests with Gemini (Playwright)
        id: e2e_test
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          E2E_ARTIFACTS_DIR: target/e2e-artifacts
        run: |
          mvn test -Dgroups=e2e -Dtest=BrowserUseE2ETest#testFindBrowserUseStars_withGemini -B 2>&1 | tee target/e2e-artifacts/maven-output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Check for generated artifacts
        id: artifacts
        if: always()
        run: |
          echo "--- Listing Playwright artifacts ---"
          ls -la target/e2e-artifacts/ 2>/dev/null || echo "No artifacts directory"
          ls -la target/e2e-artifacts/videos/ 2>/dev/null || echo "No videos directory"

      - name: Upload Playwright E2E artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-playwright-artifacts
          path: |
            target/e2e-artifacts/execution-log.txt
            target/e2e-artifacts/execution-summary.json
            target/e2e-artifacts/generated-test.spec.ts
            target/e2e-artifacts/videos/
            target/e2e-artifacts/maven-output.txt
          retention-days: 30
          if-no-files-found: warn

      - name: Fail job if test failed
        if: steps.e2e_test.outputs.exit_code != '0'
        run: exit 1

  e2e-selenium:
    name: E2E - Selenium + Gemini
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Install Chrome for Selenium
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable || true
          which google-chrome || sudo apt-get install -y chromium-browser || true

      - name: Install Playwright browsers (needed for compilation)
        run: mvn exec:java -e -D exec.mainClass=com.microsoft.playwright.CLI -D exec.args="install --with-deps chromium" -B || true

      - name: Build project
        run: mvn clean compile test-compile -B

      - name: Create artifacts directory
        run: mkdir -p target/e2e-artifacts-selenium

      - name: Run E2E tests with Gemini (Selenium)
        id: e2e_test
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          E2E_ARTIFACTS_DIR: target/e2e-artifacts
        run: |
          mvn test -Dgroups=e2e -Dtest=SeleniumE2ETest#testFindBrowserUseStars_withGeminiSelenium -B 2>&1 | tee target/e2e-artifacts-selenium/maven-output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Check for generated artifacts
        id: artifacts
        if: always()
        run: |
          echo "--- Listing Selenium artifacts ---"
          ls -la target/e2e-artifacts-selenium/ 2>/dev/null || echo "No artifacts directory"

      - name: Upload Selenium E2E artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-selenium-artifacts
          path: |
            target/e2e-artifacts-selenium/execution-log.txt
            target/e2e-artifacts-selenium/execution-summary.json
            target/e2e-artifacts-selenium/generated-test.spec.ts
            target/e2e-artifacts-selenium/maven-output.txt
          retention-days: 30
          if-no-files-found: warn

      - name: Fail job if test failed
        if: steps.e2e_test.outputs.exit_code != '0'
        run: exit 1

  notify:
    runs-on: ubuntu-latest
    needs: [e2e-playwright, e2e-selenium]
    if: always()
    steps:
      - name: Download Playwright artifacts
        uses: actions/download-artifact@v4
        with:
          name: e2e-playwright-artifacts
          path: artifacts/playwright
        continue-on-error: true

      - name: Download Selenium artifacts
        uses: actions/download-artifact@v4
        with:
          name: e2e-selenium-artifacts
          path: artifacts/selenium
        continue-on-error: true

      - name: Read Playwright execution log
        id: read_pw_log
        if: always()
        run: |
          LOG_FILE=$(find artifacts/playwright -name "execution-log.txt" 2>/dev/null | head -1)
          if [ -n "$LOG_FILE" ] && [ -f "$LOG_FILE" ]; then
            LOG_CONTENT=$(head -c 50000 "$LOG_FILE")
            echo "log_content<<EOF_LOG" >> $GITHUB_OUTPUT
            echo "$LOG_CONTENT" >> $GITHUB_OUTPUT
            echo "EOF_LOG" >> $GITHUB_OUTPUT
          else
            echo "log_content=Playwright execution log not available." >> $GITHUB_OUTPUT
          fi

      - name: Read Playwright script
        id: read_pw_script
        if: always()
        run: |
          SCRIPT_FILE=$(find artifacts/playwright -name "generated-test.spec.ts" 2>/dev/null | head -1)
          if [ -n "$SCRIPT_FILE" ] && [ -f "$SCRIPT_FILE" ]; then
            SCRIPT_CONTENT=$(head -c 3000 "$SCRIPT_FILE")
            echo "script_content<<EOF_SCRIPT" >> $GITHUB_OUTPUT
            echo "$SCRIPT_CONTENT" >> $GITHUB_OUTPUT
            echo "EOF_SCRIPT" >> $GITHUB_OUTPUT
          else
            echo "script_content=Playwright script not generated." >> $GITHUB_OUTPUT
          fi

      - name: Read Playwright summary
        id: read_pw_summary
        if: always()
        run: |
          SUMMARY_FILE=$(find artifacts/playwright -name "execution-summary.json" 2>/dev/null | head -1)
          if [ -n "$SUMMARY_FILE" ] && [ -f "$SUMMARY_FILE" ]; then
            SUMMARY_CONTENT=$(cat "$SUMMARY_FILE")
            echo "summary_content<<EOF_SUMMARY" >> $GITHUB_OUTPUT
            echo "$SUMMARY_CONTENT" >> $GITHUB_OUTPUT
            echo "EOF_SUMMARY" >> $GITHUB_OUTPUT
          else
            echo "summary_content=Playwright execution summary not available." >> $GITHUB_OUTPUT
          fi

      - name: Read Selenium execution log
        id: read_se_log
        if: always()
        run: |
          LOG_FILE=$(find artifacts/selenium -name "execution-log.txt" 2>/dev/null | head -1)
          if [ -n "$LOG_FILE" ] && [ -f "$LOG_FILE" ]; then
            LOG_CONTENT=$(head -c 50000 "$LOG_FILE")
            echo "log_content<<EOF_LOG" >> $GITHUB_OUTPUT
            echo "$LOG_CONTENT" >> $GITHUB_OUTPUT
            echo "EOF_LOG" >> $GITHUB_OUTPUT
          else
            echo "log_content=Selenium execution log not available." >> $GITHUB_OUTPUT
          fi

      - name: Read Selenium summary
        id: read_se_summary
        if: always()
        run: |
          SUMMARY_FILE=$(find artifacts/selenium -name "execution-summary.json" 2>/dev/null | head -1)
          if [ -n "$SUMMARY_FILE" ] && [ -f "$SUMMARY_FILE" ]; then
            SUMMARY_CONTENT=$(cat "$SUMMARY_FILE")
            echo "summary_content<<EOF_SUMMARY" >> $GITHUB_OUTPUT
            echo "$SUMMARY_CONTENT" >> $GITHUB_OUTPUT
            echo "EOF_SUMMARY" >> $GITHUB_OUTPUT
          else
            echo "summary_content=Selenium execution summary not available." >> $GITHUB_OUTPUT
          fi

      - name: Determine overall status
        id: overall
        if: always()
        run: |
          PW_STATUS="${{ needs.e2e-playwright.result }}"
          SE_STATUS="${{ needs.e2e-selenium.result }}"
          if [ "$PW_STATUS" = "success" ] && [ "$SE_STATUS" = "success" ]; then
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "status=failure" >> $GITHUB_OUTPUT
          fi

      - name: Send success email
        if: steps.overall.outputs.status == 'success'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "E2E Tests Passed (Playwright + Selenium) - browser-automation"
          to: ${{ secrets.NOTIFICATION_EMAIL }}
          from: ${{ secrets.EMAIL_USERNAME }}
          html_body: |
            <h2>E2E Tests PASSED</h2>
            <p><strong>Repository:</strong> ${{ github.repository }}<br/>
            <strong>Branch:</strong> ${{ github.ref_name }}<br/>
            <strong>Run:</strong> <a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}">${{ github.run_id }}</a><br/>
            <strong>Artifacts:</strong> <a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}">Download from Actions run</a></p>

            <h2>Playwright + Gemini: ${{ needs.e2e-playwright.result }}</h2>
            <h3>Execution Summary</h3>
            <pre>${{ steps.read_pw_summary.outputs.summary_content }}</pre>
            <h3>Execution Log</h3>
            <pre>${{ steps.read_pw_log.outputs.log_content }}</pre>
            <h3>Generated Playwright Script</h3>
            <pre>${{ steps.read_pw_script.outputs.script_content }}</pre>
            <h3>Video Recording</h3>
            <p>Download <code>e2e-playwright-artifacts</code> from <a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}">Actions</a> to view the video.</p>

            <hr/>

            <h2>Selenium + Gemini: ${{ needs.e2e-selenium.result }}</h2>
            <h3>Execution Summary</h3>
            <pre>${{ steps.read_se_summary.outputs.summary_content }}</pre>
            <h3>Execution Log</h3>
            <pre>${{ steps.read_se_log.outputs.log_content }}</pre>

            <hr/>
            <p><em>Automated notification from the browser-automation E2E test pipeline.</em></p>

      - name: Send failure email
        if: steps.overall.outputs.status == 'failure'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "E2E Tests Failed (Playwright: ${{ needs.e2e-playwright.result }}, Selenium: ${{ needs.e2e-selenium.result }}) - browser-automation"
          to: ${{ secrets.NOTIFICATION_EMAIL }}
          from: ${{ secrets.EMAIL_USERNAME }}
          html_body: |
            <h2>E2E Tests FAILED</h2>
            <p><strong>Repository:</strong> ${{ github.repository }}<br/>
            <strong>Branch:</strong> ${{ github.ref_name }}<br/>
            <strong>Run:</strong> <a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}">${{ github.run_id }}</a><br/>
            <strong>Artifacts:</strong> <a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}">Download from Actions run</a></p>

            <h2>Playwright + Gemini: ${{ needs.e2e-playwright.result }}</h2>
            <h3>Execution Summary</h3>
            <pre>${{ steps.read_pw_summary.outputs.summary_content }}</pre>
            <h3>Execution Log</h3>
            <pre>${{ steps.read_pw_log.outputs.log_content }}</pre>
            <h3>Generated Playwright Script</h3>
            <pre>${{ steps.read_pw_script.outputs.script_content }}</pre>

            <hr/>

            <h2>Selenium + Gemini: ${{ needs.e2e-selenium.result }}</h2>
            <h3>Execution Summary</h3>
            <pre>${{ steps.read_se_summary.outputs.summary_content }}</pre>
            <h3>Execution Log</h3>
            <pre>${{ steps.read_se_log.outputs.log_content }}</pre>

            <hr/>
            <p><em>Automated notification from the browser-automation E2E test pipeline.</em></p>
